seed: 0
log_dir: runs
exp_name: 2v2_wvr_cepg_mepg_balanced

env:
  combat_mode: wvr_lock
  n_agents: 2
  n_enemies: 2
  max_steps: 320
  physics_dt: 0.1
  decision_skip: 10

  arena_xy: 25000.0
  clip_arena_xy: false

  min_alt: 400.0
  max_alt: 20000.0
  init_alt: 4500.0
  init_speed: 290.0
  init_range_min: 3000.0
  init_range_max: 5500.0
  init_lateral_spread: 1200.0
  line_spacing: 1000.0
  init_heading_noise: 0.35
  init_alt_noise: 500.0
  init_speed_noise: 35.0

  crash_altitude: 100.0
  high_altitude_limit: 12000.0
  soft_boundary_radius: 22000.0
  hard_boundary_radius: 28000.0
  no_engage_limit: 120.0
  no_engage_distance: 14000.0

  lock_enable: true
  lock_range: 3500.0
  lock_fov_deg: 24.0
  lock_elev_fov_deg: 20.0
  lock_rear_aspect_deg: 125.0
  lock_build_time: 1.2
  lock_break_grace: 0.2

  gun_enable: true
  gun_range: 1500.0
  gun_fov_deg: 16.0
  gun_elev_fov_deg: 12.0
  gun_rear_aspect_deg: 135.0
  gun_burst_cooldown: 0.5
  gun_damage: 0.2

  auto_assign_targets: true
  script_enemy: true
  script_enemy_eps: 0.10
  aircraft_hp: 1.0

  preferred_altitude: 4500.0
  preferred_altitude_tol: 2200.0

  reward_kill: 16.0
  reward_loss: 20.0
  reward_step: -0.001
  reward_win: 50.0
  reward_lose: 25.0
  reward_damage_enemy: 2.0
  reward_damage_friend: 3.2

  reward_lock_friendly: 0.003
  reward_lock_enemy: 0.0
  reward_tail_pos: 0.045
  reward_nose_on: 0.004
  reward_gun_window: 0.020
  reward_lock_window: 0.020
  reward_lock_hold: 0.040
  reward_support: 0.020
  reward_coop_pressure: 0.020
  reward_coop_kill: 6.0
  reward_man_advantage_gain: 6.0
  reward_alive_advantage: 3.0
  reward_being_tailed: 0.080
  reward_tail_lock_combo: 0.080
  reward_mutual_kill: 20.0

  reward_low_altitude: 0.05
  reward_altitude_band: 0.0
  reward_crash_extra: 4.0
  reward_soft_boundary: 0.01
  reward_high_altitude_terminate: 1.0
  reward_hard_boundary: 2.0
  reward_no_engage_terminate: 1.0

  reward_timeout_draw: 0.5
  reward_enemy_abort: 0.0

  single_attacker_per_target: false
  gun_single_attacker_per_target: false

model:
  actor_hidden_dim: 128
  critic_d_model: 128
  critic_heads: 2
  critic_layers: 2
  critic_ff_dim: 256
  dropout: 0.0

algo:
  gamma: 0.99
  alpha: 0.02
  tau: 0.005
  lr_actor: 0.0001
  lr_critic: 0.0002
  huber_delta: 1.0
  grad_clip_norm: 5.0
  q_eval_mode: mepg

  batch_size: 256
  buffer_size: 200000
  learning_starts: 5000
  update_every: 1
  updates_per_step: 1

  epsilon_start: 0.08
  epsilon_final: 0.01
  epsilon_anneal_steps: 120000

train:
  total_env_steps: 4000000
  log_interval: 10
  save_interval: 100

eval:
  enabled: true
  interval_env_steps: 10000
  episodes: 10
  deterministic: true

opponent:
  mode: rule
  pool_size: 10
  snapshot_interval: 25
  mix_rule_prob: 0.34
  mix_current_prob: 0.33
  mix_pool_prob: 0.33
